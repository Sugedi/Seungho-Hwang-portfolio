<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>황승호 · 게임 시스템 기획자 [Dark]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo:    #818CF8; --indigo-lt: #A5B4FC; --indigo-dim: rgba(99,102,241,.18);
      --amber:     #F59E0B; --amber-lt:  #FCD34D; --amber-dim:  rgba(245,158,11,.15);
      --dark:      #F0F6FC; --mid:       #C9D1D9; --muted:      #8B949E;
      --border:    #21262D; --bg:        #0D1117; --white:      #161B22;
    }
    html { scroll-behavior: smooth; font-size: 17px; }
    body { background: var(--bg); color: var(--dark); font-family: 'Noto Sans KR', system-ui, sans-serif; line-height: 1.6; overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(13,17,23,.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: .875rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-weight: 600; font-size: 1.05rem; letter-spacing: .08em; color: rgba(255,255,255,.9); }
    .nav-logo em { font-style: normal; color: rgba(255,255,255,.35); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: .82rem; font-weight: 600; color: var(--muted); text-decoration: none; transition: color .2s; }
    .nav-links a:hover { color: var(--indigo); }

    /* HERO */
    #hero { display: flex; align-items: center; justify-content: center; padding: 7rem 6vw 4rem; position: relative; overflow: hidden; background: var(--bg); }
    .hero-dot-bg { display: none; }
    .hero-inner { position: relative; width: 100%; max-width: 1600px; display: grid; grid-template-columns: 1fr clamp(280px, 22vw, 420px); gap: clamp(3rem, 5vw, 7rem); align-items: center; }
    .hero-eyebrow { display: flex; align-items: center; gap: .6rem; font-size: .72rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--indigo); margin-bottom: 1.5rem; }
    .hero-eyebrow::before { content: ''; width: 24px; height: 2px; background: var(--indigo); border-radius: 2px; }
    .hero-name { font-size: clamp(3.5rem, 9vw, 9rem); font-weight: 900; letter-spacing: -.05em; line-height: .95; margin-bottom: 1.25rem; color: var(--dark); }
    .hero-role { font-size: clamp(.95rem, 1.2vw, 1.15rem); color: var(--muted); font-weight: 400; margin-bottom: 2rem; line-height: 1.75; max-width: 720px; }
    .hero-role strong { color: var(--dark); font-weight: 700; }
    .hero-cta { display: flex; gap: .875rem; flex-wrap: wrap; }
    .hero-right { display: flex; flex-direction: column; gap: .875rem; }
    .btn { padding: .75rem 1.75rem; border-radius: 6px; font-size: .85rem; font-weight: 700; text-decoration: none; transition: all .22s; display: inline-flex; align-items: center; gap: .4rem; }
    .btn-primary { background: var(--indigo); color: #fff; }
    .btn-primary:hover { background: #6366F1; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(129,140,248,.3); }
    .btn-outline { border: 1.5px solid var(--border); color: var(--mid); background: transparent; }
    .btn-outline:hover { border-color: var(--indigo); color: var(--indigo); transform: translateY(-2px); }
    .hic { background: #1C2128; border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; box-shadow: 0 1px 8px rgba(0,0,0,.3); }
    .hic-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: .3rem; }
    .hic-value { font-size: .95rem; font-weight: 700; color: var(--dark); }
    .hic-sub { font-size: .75rem; color: var(--muted); margin-top: .1rem; }
    .badge-green { display: inline-flex; align-items: center; gap: .35rem; background: rgba(34,197,94,.15); color: #4ADE80; border-radius: 100px; padding: .15rem .65rem; font-size: .72rem; font-weight: 700; margin-top: .4rem; }
    .badge-green::before { content: ''; width: 6px; height: 6px; background: #22C55E; border-radius: 50%; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    @keyframes spin  { to { transform: rotate(360deg); } }

    /* STATS */
    #stats-wrap { background: #0f1520; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    #stats { padding: 3rem 6vw; }
    .stats-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(4,1fr); gap: 2rem; text-align: center; }
    .stat-num { font-size: 3rem; font-weight: 900; color: #fff; letter-spacing: -.05em; line-height: 1; margin-bottom: .3rem; }
    .stat-num sup { font-size: 1.5rem; vertical-align: super; }
    .stat-lbl { font-size: .8rem; color: rgba(255,255,255,.7); font-weight: 500; }
    .stat-sub { font-size: .68rem; color: rgba(255,255,255,.4); margin-top: .15rem; }

    /* SECTION */
    .section { padding: 6rem 3rem; max-width: 1200px; margin: 0 auto; }
    .section-bg { background: #0f1520; }
    #projects, #career, #education, #skills { background: #0f1520; border-top: 1px solid var(--border); }
    .sec-eye { display: flex; align-items: center; gap: .6rem; font-size: .72rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--indigo); margin-bottom: .75rem; }
    .sec-eye::before { content: ''; width: 20px; height: 2px; background: var(--indigo); border-radius: 2px; }
    .sec-title { font-size: clamp(1.8rem,4vw,2.75rem); font-weight: 900; letter-spacing: -.04em; color: var(--dark); margin-bottom: 1rem; }
    .sec-desc { color: var(--muted); font-size: .95rem; line-height: 1.75; margin-bottom: 3rem; }

    /* IMAGE SLIDER */
    .slider { position: relative; width: 46%; min-width: 46%; height: auto; min-height: 300px; border-radius: 0; overflow: hidden; background: #000; margin-bottom: 0; flex-shrink: 0; }
    .slide { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; opacity: 0; transition: opacity .65s ease; }
    .slide.active { opacity: 1; }
    .slider-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: .5rem; }
    .slider-placeholder-icon { font-size: 2.2rem; opacity: .25; }
    .slider-placeholder-txt { font-size: .78rem; color: var(--muted); opacity: .6; }
    .slider-dots { position: absolute; bottom: .75rem; left: 50%; transform: translateX(-50%); display: flex; gap: .4rem; z-index: 2; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.35); cursor: pointer; transition: all .25s; }
    .sdot.active { background: white; width: 18px; border-radius: 3px; }
    .slider-arrows { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 .5rem; opacity: 0; transition: opacity .2s; }
    .slider:hover .slider-arrows { opacity: 1; }
    .sarrow { background: rgba(0,0,0,.5); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: background .2s; }
    .sarrow:hover { background: rgba(0,0,0,.75); }

    /* PROJECT CARDS */
    .proj-grid { display: flex; flex-direction: column; gap: 1.5rem; }
    .proj-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: row; align-items: stretch; transition: all .3s; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .proj-card:hover { border-color: var(--indigo); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(129,140,248,.15); }
    .proj-body { padding: 2rem 2rem 1.75rem; display: flex; flex-direction: column; flex: 1; }
    .proj-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: .5rem; }
    .proj-number { font-size: 2.2rem; font-weight: 900; color: rgba(255,255,255,.1); letter-spacing: -.05em; line-height: 1; transition: color .3s; flex-shrink: 0; }
    .proj-card:hover .proj-number { color: rgba(129,140,248,.5); }
    .proj-tags { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; justify-content: flex-end; }
    .ptag { display: inline-block; padding: .25rem .8rem; border-radius: 5px; font-size: .78rem; font-weight: 700; }
    .ptag-content { background: var(--indigo-dim); color: var(--indigo); }
    .ptag-bm      { background: var(--amber-dim);  color: var(--amber); }
    .ptag-system  { background: rgba(20,184,166,.15); color: #2DD4BF; }
    .proj-game { display: inline-flex; align-items: center; gap: .3rem; font-size: .76rem; font-weight: 600; color: var(--mid); background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 100px; padding: .2rem .7rem; }
    .proj-title { font-size: 1.35rem; font-weight: 800; color: var(--dark); margin-bottom: .3rem; letter-spacing: -.03em; }
    .proj-period { font-size: .82rem; color: var(--muted); margin-bottom: 1rem; }
    .proj-desc { font-size: .92rem; color: var(--mid); line-height: 1.7; margin-bottom: 1.5rem; }
    .proj-hr { height: 1px; background: var(--border); margin-bottom: 1.25rem; }
    .proj-metrics { display: flex; flex-wrap: wrap; gap: .45rem; margin-bottom: auto; }
    .metric { background: #1C2128; border: 1px solid var(--border); border-radius: 6px; padding: .28rem .75rem; font-size: .8rem; color: var(--muted); }
    .metric b { color: var(--indigo); }
    .metric.m-amber b { color: var(--amber); }
    .proj-links { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1.25rem; }
    .proj-link { display: inline-flex; align-items: center; gap: .35rem; padding: .5rem 1rem; border: 1px solid rgba(129,140,248,.35); border-radius: 7px; font-size: .82rem; font-weight: 700; color: var(--indigo); text-decoration: none; transition: all .2s; background: transparent; }
    .proj-link:hover { background: var(--indigo-dim); border-color: var(--indigo); }

    /* CAREER */
    .career-list { display: flex; flex-direction: column; gap: 2rem; }
    .career-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    /* 회사 헤더 */
    .career-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
    .career-logo { width: 52px; height: 52px; border-radius: 12px; object-fit: contain; background: #fff; border: 1px solid var(--border); padding: 5px; flex-shrink: 0; }
    .career-logo-placeholder { width: 52px; height: 52px; border-radius: 12px; background: var(--indigo-dim); border: 1px solid rgba(129,140,248,.2); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
    .career-header-info { flex: 1; min-width: 0; }
    .career-co { font-size: 1.2rem; font-weight: 900; color: var(--dark); letter-spacing: -.03em; margin-bottom: .2rem; }
    .career-role-txt { font-size: .85rem; color: var(--indigo); font-weight: 700; margin-bottom: .15rem; }
    .career-dates { font-size: .76rem; color: var(--muted); }
    /* 프로젝트(게임) 서브 섹션 */
    .career-project { border-top: 1px solid var(--border); }
    .career-project-header { padding: 1.1rem 2rem; display: flex; align-items: center; gap: 1rem; background: rgba(129,140,248,.04); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .career-project-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--indigo-dim); border: 1px solid rgba(129,140,248,.2); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; overflow: hidden; }
    .career-project-icon img { width: 100%; height: 100%; object-fit: contain; background: #fff; padding: 3px; }
    .career-project-info { flex: 1; min-width: 0; }
    .career-project-name { font-size: .98rem; font-weight: 800; color: var(--dark); letter-spacing: -.02em; margin-bottom: .1rem; }
    .career-project-desc { font-size: .74rem; color: var(--muted); }
    /* 프로젝트 배너 이미지 */
    .career-project-banner { position: relative; height: 280px; overflow: hidden; background: #1C2128; border-bottom: 1px solid var(--border); }
    .career-project-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .career-project-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 55%); pointer-events: none; }
    /* 태스크 그리드 */
    .career-project-body { padding: 1.25rem 2rem 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 1rem; }
    .career-item { display: flex; align-items: flex-start; gap: .75rem; padding: 1rem; background: #1C2128; border-radius: 10px; border: 1px solid var(--border); }
    .ci-icon { font-size: 1.15rem; flex-shrink: 0; margin-top: .05rem; }
    .ci-title { font-size: .88rem; font-weight: 700; color: var(--dark); margin-bottom: .2rem; }
    .ci-desc { font-size: .78rem; color: var(--muted); line-height: 1.6; white-space: pre-line; }
    .ci-tag { display: inline-block; margin-top: .4rem; padding: .12rem .5rem; border-radius: 4px; font-size: .67rem; font-weight: 700; background: var(--indigo-dim); color: var(--indigo); }

    /* EDUCATION */
    .edu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 1.25rem; }
    .edu-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem 1.75rem; box-shadow: 0 1px 4px rgba(0,0,0,.3); display: flex; gap: 1.1rem; align-items: flex-start; }
    .edu-icon-wrap { width: 42px; height: 42px; background: var(--indigo-dim); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; overflow: hidden; }
    .edu-icon-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 5px; background: #fff; }
    .edu-school { font-size: 1.05rem; font-weight: 800; color: var(--dark); margin-bottom: .2rem; }
    .edu-major { font-size: .85rem; color: var(--indigo); font-weight: 600; margin-bottom: .3rem; }
    .edu-period { font-size: .78rem; color: var(--muted); }
    .edu-status { display: inline-block; margin-top: .5rem; padding: .15rem .55rem; border-radius: 5px; font-size: .7rem; font-weight: 700; }
    .edu-graduated { background: rgba(34,197,94,.15); color: #4ADE80; }
    .edu-enrolled  { background: var(--indigo-dim); color: var(--indigo); }

    /* SKILLS */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px,1fr)); gap: 1rem; }
    .skill-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: visible; position: relative; }
    .skill-card-inner { padding: 1.5rem 1rem 1.25rem; display: flex; flex-direction: column; align-items: center; gap: .55rem; text-align: center; border-radius: 14px; overflow: hidden; }
    .skill-icon { width: 54px; height: 54px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: #fff; letter-spacing: -.02em; flex-shrink: 0; }
    .skill-icon.dark-icon { box-shadow: inset 0 0 0 1px rgba(255,255,255,.12); }
    .skill-name { font-size: .9rem; font-weight: 700; color: var(--dark); }
    .skill-meta { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; justify-content: center; }
    .skill-level { font-size: .68rem; font-weight: 700; padding: .15rem .55rem; border-radius: 100px; }
    .level-mid { background: rgba(129,140,248,.18); color: var(--indigo); }
    .level-low { background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid var(--border); }
    .skill-category { font-size: .66rem; color: var(--muted); }
    .skill-tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(4px); background: #1A1F2B; border: 1px solid var(--border); border-radius: 10px; padding: .875rem 1.1rem; width: max-content; max-width: 380px; z-index: 50; opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; white-space: pre-line; font-size: .8rem; color: rgba(255,255,255,.82); line-height: 1.7; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .skill-card:hover .skill-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
    .skill-card { transition: border-color .2s, box-shadow .2s; }
    .skill-card:hover { border-color: var(--indigo); box-shadow: 0 4px 20px rgba(129,140,248,.18); }

    /* CONTACT */
    #contact-section { background: #080B10; color: #fff; padding: 7rem 3rem; text-align: center; position: relative; overflow: hidden; border-top: 1px solid var(--border); }
    .contact-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 70% at 50% 120%, rgba(129,140,248,.25) 0%, transparent 65%); pointer-events: none; }
    .contact-inner { position: relative; max-width: 600px; margin: 0 auto; }
    .contact-eye { display: flex; align-items: center; justify-content: center; gap: .6rem; font-size: .72rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--indigo-lt); margin-bottom: 1.25rem; }
    .contact-eye::before, .contact-eye::after { content: ''; flex: 1; max-width: 40px; height: 1px; background: rgba(255,255,255,.1); }
    .contact-title { font-size: clamp(2.2rem,5vw,3.5rem); font-weight: 900; letter-spacing: -.04em; margin-bottom: 1rem; }
    .contact-desc { color: rgba(255,255,255,.45); line-height: 1.75; margin-bottom: 2.25rem; white-space: pre-line; }
    .contact-email { display: inline-block; font-size: 1.1rem; font-weight: 700; color: var(--indigo-lt); text-decoration: none; border-bottom: 2px solid rgba(165,180,252,.3); padding-bottom: .2rem; transition: border-color .2s; }
    .contact-email:hover { border-color: var(--indigo-lt); }
    .contact-phone { margin-top: .75rem; font-size: .88rem; color: rgba(255,255,255,.35); }

    footer { background: #05070C; text-align: center; padding: 1.75rem 2rem; font-size: .76rem; color: rgba(255,255,255,.2); border-top: 1px solid rgba(255,255,255,.05); }

    /* FADE */
    .fade { opacity: 0; transform: translateY(22px); transition: opacity .6s ease, transform .6s ease; }
    .fade.in { opacity: 1; transform: none; }
    .fd1 { transition-delay: .1s; } .fd2 { transition-delay: .2s; } .fd3 { transition-delay: .3s; }

    @media (max-width: 1100px) {
      .hero-inner { grid-template-columns: 1fr clamp(260px, 28vw, 360px); }
    }
    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; }
      .hero-right { flex-direction: row; flex-wrap: wrap; }
      .stats-inner { grid-template-columns: repeat(2,1fr); }
      .proj-card { flex-direction: column; }
      .slider { width: 100%; min-width: 100%; height: 240px; min-height: 240px; border-radius: 0; }
    }
    @media (max-width: 600px) {
      nav { padding: .875rem 1.5rem; } nav .nav-links { display: none; }
      .section { padding: 4rem 1.25rem; }
      #hero { padding: 7rem 1.25rem 4rem; }
      #stats-wrap { } #stats { padding: 2.5rem 1.25rem; }
      .career-header { padding: 1.25rem; }
      .career-project-header { padding: 1rem 1.25rem; }
      .career-project-body { padding: 1rem 1.25rem 1.25rem; }
      .career-item { padding: .875rem; }
    }
  </style>
</head>
<body>

<!-- 로딩 스피너 -->
<div id="page-loader" style="display:flex;position:fixed;inset:0;background:rgba(13,17,23,.97);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:1rem;transition:opacity .3s;">
  <div style="width:36px;height:36px;border:3px solid #21262D;border-top-color:#818CF8;border-radius:50%;animation:spin .8s linear infinite;"></div>
  <p id="loader-msg" style="font-size:.88rem;color:#8B949E;text-align:center;line-height:1.6;">데이터 불러오는 중...</p>
</div>

<nav>
  <button class="nav-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="background:none;border:none;cursor:pointer;padding:0;">승호<em>.</em></button>
  <ul class="nav-links">
    <li><a href="#career">경력</a></li>
    <li><a href="#projects">주요 작업</a></li>
    <li><a href="#education">학력 & 경험</a></li>
    <li><a href="#skills">스킬</a></li>
    <li><a href="#contact-section">연락</a></li>
  </ul>
</nav>

<!-- 페이지 컨테이너: JS가 채워줍니다 -->
<div id="hero"></div>
<div id="stats"></div>
<div id="career"></div>
<div id="projects"></div>
<div id="education"></div>
<div id="skills"></div>
<div id="contact-section"></div>
<footer id="footer"></footer>

<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║               DATA LOADING (JSON fetch)                      ║
   ║  내용 수정 → data/ 폴더의 JSON 파일을 열어 수정하세요.       ║
   ║  · 프로젝트 추가/수정  →  data/projects.json                 ║
   ║  · 경력 추가/수정      →  data/careers.json                  ║
   ║  · 개인정보·스탯 등    →  data/config.json                   ║
   ╚══════════════════════════════════════════════════════════════╝ */

let DATA = null;

async function loadData() {
  const load = url => fetch(url).then(r => {
    if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
    return r.json();
  });
  const [projects, careers, config] = await Promise.all([
    load('data/projects.json'),
    load('data/careers.json'),
    load('data/config.json'),
  ]);
  DATA = { ...config, projects, careers };
}

/* ── 날짜 유틸 ──────────────────────────────────────────────── */
function parseDateStr(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, (m || 1) - 1, d || 1);
}
function calcDuration(startStr, endStr) {
  const s = parseDateStr(startStr);
  const e = endStr ? parseDateStr(endStr) : new Date();
  let years = e.getFullYear() - s.getFullYear();
  let months = e.getMonth() - s.getMonth();
  if (e.getDate() < s.getDate()) months--;
  if (months < 0) { years--; months += 12; }
  if (years > 0) return `약 ${years}년 ${months}개월`;
  return `약 ${months}개월`;
}
function careerYear(startStr) {
  return new Date().getFullYear() - parseDateStr(startStr).getFullYear() + 1;
}
function fmtDate(str) {
  if (!str) return "현재";
  const [y, m] = str.split('-');
  return m ? `${y}.${m.padStart(2,'0')}` : y;
}

/* ── 슬라이더 HTML ──────────────────────────────────────────── */
function sliderHTML(images, alt) {
  if (!images || images.length === 0) {
    return `<div class="slider"><div class="slider-placeholder">
      <div class="slider-placeholder-icon">📸</div>
      <div class="slider-placeholder-txt">이미지를 추가해주세요</div>
    </div></div>`;
  }
  const slides = images.map((src, i) =>
    `<img class="slide${i===0?' active':''}" src="${src}" alt="${alt} ${i+1}">`
  ).join('');
  const dots = images.length > 1 ? `<div class="slider-dots">
    ${images.map((_,i)=>`<span class="sdot${i===0?' active':''}" data-i="${i}"></span>`).join('')}
  </div>
  <div class="slider-arrows">
    <button class="sarrow" data-dir="-1">‹</button>
    <button class="sarrow" data-dir="1">›</button>
  </div>` : '';
  return `<div class="slider">${slides}${dots}</div>`;
}

/* ── RENDER PROJECTS ────────────────────────────────────────── */
function renderProjects() {
  const cards = DATA.projects.map((p,i) => {
    const metrics = p.metrics.map(m => {
      const cls = m.color === 'amber' ? ' m-amber' : '';
      const inner = m.label ? `${m.label} <b>${m.value}</b>` : m.value;
      return `<span class="metric${cls}">${inner}</span>`;
    }).join('');
    return `
    <div class="proj-card fade fd${i%4}">
      ${sliderHTML(p.images, p.title)}
      <div class="proj-body">
        <div class="proj-header-row">
          <span class="proj-number">${p.number}</span>
          <div class="proj-tags">
            <span class="ptag ptag-${p.tagType}">${p.tag}</span>

        </div>
        <p class="proj-title">${p.title}</p>
        <p class="proj-period">${p.period}</p>
        <p class="proj-desc">${p.desc}</p>
        <div class="proj-hr"></div>

  document.getElementById('projects').innerHTML = `
    <div class="section" id="projects-inner">
      <p class="sec-eye fade">Featured Works</p>
      <h2 class="sec-title fade fd1">주요 작업</h2>

    </div>`;
}

/* ── RENDER CAREER ──────────────────────────────────────────── */
function isCurrent(endDate) {
  return !endDate || endDate === '[재직 중]';
}

function renderCareer() {
  const cards = DATA.careers.map((c, ci) => {
    const current = isCurrent(c.endDate);
    const endForCalc = current ? null : c.endDate;
    const dur = calcDuration(c.startDate, endForCalc);
    const badge = current
      ? `<span class="badge-green" style="display:inline-flex;margin-top:.3rem">재직 중</span>` : '';

    const logo = c.companyLogo
      ? `<img class="career-logo" src="${c.companyLogo}" alt="${c.company} 로고">`
      : `<div class="career-logo-placeholder">🏢</div>`;

    const projects = (c.projects || []).map(proj => {
      const banner = proj.image
        ? `<div class="career-project-banner">
             <img src="${proj.image}" alt="${proj.name}">
             <div class="career-project-banner-overlay"></div>
           </div>`
        : '';

      const tasks = (proj.tasks || []).map(h => `
        <div class="career-item">
          <span class="ci-icon">${h.icon}</span>
          <div>
            <div class="ci-title">${h.title}</div>
            <div class="ci-desc">${h.desc}</div>
            <span class="ci-tag">${h.tag}</span>
          </div>
        </div>`).join('');

      return `
      <div class="career-project">
        <div class="career-project-header">
          <div class="career-project-icon">${proj.gameLogo ? `<img src="${proj.gameLogo}" alt="${proj.name} 로고">` : (proj.icon || '🎮')}</div>
          <div class="career-project-info">
            <div class="career-project-name">${proj.name}</div>
            <div class="career-project-desc">${proj.desc}</div>
          </div>
        </div>
        ${banner}
        <div class="career-project-body">${tasks}</div>
      </div>`;
    }).join('');

    return `
    <div class="career-card fade fd${ci}">
      <div class="career-header">
        ${logo}
        <div class="career-header-info">
          <div class="career-co">${c.company}</div>
          <div class="career-role-txt">${c.role}</div>
          <div class="career-dates">${fmtDate(c.startDate)} ~ ${current ? '현재' : fmtDate(c.endDate)} &nbsp;·&nbsp; ${dur}</div>
          ${badge}
        </div>
      </div>
      ${projects}
    </div>`;
  }).join('');

  document.getElementById('career').innerHTML = `
    <div class="section" id="career">
      <p class="sec-eye fade">Experience</p>
      <h2 class="sec-title fade fd1">경력</h2>
      <div class="career-list">${cards}</div>
    </div>`;
}

/* ── INIT SLIDERS ───────────────────────────────────────────── */
function initSliders() {
  const pool = [];

  document.querySelectorAll('.slider').forEach(slider => {
    const slides = [...slider.querySelectorAll('.slide')];
    const dots   = [...slider.querySelectorAll('.sdot')];
    if (slides.length <= 1) return;

    const s = { cur: 0, paused: false };

    const goTo = n => {
      slides[s.cur].classList.remove('active');
      dots[s.cur]?.classList.remove('active');
      s.cur = (n + slides.length) % slides.length;
      slides[s.cur].classList.add('active');
      dots[s.cur]?.classList.add('active');
    };

    slider.addEventListener('mouseenter', () => s.paused = true);
    slider.addEventListener('mouseleave', () => s.paused = false);
    dots.forEach(d => d.addEventListener('click', () => { goTo(+d.dataset.i); }));
    slider.querySelectorAll('.sarrow').forEach(a =>
      a.addEventListener('click', e => { e.preventDefault(); goTo(s.cur + +a.dataset.dir); })
    );

    pool.push({ s, goTo });
  });

  /* 전체 슬라이더 동시 전환 */
  setInterval(() => {
    pool.forEach(({ s, goTo }) => { if (!s.paused) goTo(s.cur + 1); });
  }, 2500);
}

/* ── SCROLL FADE ────────────────────────────────────────────── */
function initFade() {
  const io = new IntersectionObserver(
    es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }),
    { threshold: 0.1 }
  );
  document.querySelectorAll('.fade').forEach(el => io.observe(el));
}

/* ── COUNTER ────────────────────────────────────────────────── */
function initCounters() {
  const io = new IntersectionObserver(es => {
    es.forEach(e => {
      if (!e.isIntersecting) return;
      e.target.querySelectorAll('[data-target]').forEach(el => {
        const target = +el.dataset.target, t0 = performance.now();
        const tick = now => {
          const p = Math.min((now - t0) / 1400, 1);
          el.textContent = Math.round((1 - Math.pow(1-p, 3)) * target);
          if (p < 1) requestAnimationFrame(tick); else el.textContent = target;
        };
        requestAnimationFrame(tick);
      });
      io.unobserve(e.target);
    });
  }, { threshold: 0.3 });
  const statsEl = document.querySelector('.stats-inner');
  if (statsEl) io.observe(statsEl);
}

/* ── BOOT ───────────────────────────────────────────────────── */
async function boot() {
  const loader = document.getElementById('page-loader');
  const msg    = document.getElementById('loader-msg');
  try {
    await loadData();
    renderHero(); renderStats(); renderProjects(); renderCareer();
    renderEducation(); renderSkills(); renderContact(); renderFooter();
    initSliders(); initFade(); initCounters();
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 300);
  } catch (err) {
    msg.innerHTML =
      '⚠️ <strong>데이터 파일을 불러올 수 없습니다.</strong><br><br>' +
      'Live Server(포트 5500)로 열어주세요.<br>' +
      '<span style="font-size:.78rem;color:#8B949E">파일을 직접 더블클릭하면 fetch가 동작하지 않습니다.</span>';
    console.error(err);
  }
}
boot();
